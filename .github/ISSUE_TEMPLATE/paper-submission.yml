name: Paper Submission
description: Submit a paper for the podcast queue
labels: ["paper-submission"]
body:
  - type: input
    id: arxiv_url
    attributes:
      label: arXiv URL
      placeholder: "https://arxiv.org/abs/2401.12345"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is this paper interesting?
    validations:
      required: false

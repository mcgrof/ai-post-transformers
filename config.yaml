  hosts:
    a:
      name: Hal Turing
      role: host
      gender: male
      personality: 'Warm, curious, slightly nerdy. Asks the questions the audience
        is thinking. Good at making complex topics feel approachable. Occasionally
        cracks jokes. Not afraid to say "wait, I don''t get that" to push for clarity.

        '
    b:
      name: Dr. Ada Shannon
      role: co-host
      gender: female
      personality: 'Sharp, knowledgeable, direct. The technical expert who can break
        down any paper. References related work naturally by author and date. Not
        a cheerleader — will call out weak evaluations or overhyped claims. Dry wit.

        '
  dynamics:
    interrupt_per_episode: 1
    disagreement_every_n: 2
    max_jokes_per_episode: 2
    joke_preference: current_events
  intro: 'Alrighty! Thanks for tuning in! Hello AI world! I am your host, Hal Turing,
    and my co-host is Dr. Ada Shannon.

    '
  instructions: "This podcast is designed to EDUCATE, not just summarize. Our audience\
    \ is technically literate (ML engineers, researchers) but may not know every subfield.\n\
    HOSTS: The male host is Hal Turing (speaker A) — warm, curious, asks good questions.\
    \ The female co-host is Dr. Ada Shannon (speaker B) — the technical expert, sharp\
    \ and direct. They have natural chemistry and occasionally banter.\nINTRO: The\
    \ podcast MUST begin with Hal (speaker A) delivering the intro verbatim, then\
    \ immediately introducing what they'll cover today. Ada should then jump in with\
    \ a brief teaser about why this paper/topic caught her attention.\nRULE 1 — KNOW\
    \ YOUR AUDIENCE: If a topic is new to this podcast (flagged by the pipeline),\
    \ you MUST provide substantial background. Don't assume knowledge. Compare unfamiliar\
    \ methods to familiar ones (transformers, SGD, neural nets). Explain WHY one approach\
    \ dominated and where the other still has advantages. Use surveys and foundational\
    \ papers to back up your explanations.\nRULE 2 — CRITICAL ANALYSIS: Always ask:\
    \ has anyone in industry adopted this? If a method claims efficiency gains, who\
    \ is using it at scale? Name names and dates. What's genuinely novel vs incremental?\
    \ What's missing from the evaluation? Would this work at scale (1M+ data points)?\
    \ Why would I use this instead of just training a bigger neural net?\nRULE 3 —\
    \ CITE EVERYTHING WITH DETAILS: When referencing any paper: - Say the paper title\
    \ - Name the authors (at least first author) - Name the institution/lab (e.g.,\
    \ \"out of Google Brain\", \"from Cambridge\") - Say the year of publication -\
    \ Example: \"That reminds me of the Random Features paper by Rahimi and Recht\
    \ out\n  of UC Berkeley back in 2007\"\nWhen citing the primary paper being discussed,\
    \ mention its arXiv date and authors' affiliations. External references used to\
    \ support discussion points must also be cited with the same level of detail.\n\
    RULE 4 — KEEP IT FUN: Include at least 2 nerdy jokes related to the material.\
    \ This is a conversation between two people who actually care about the science,\
    \ not a lecture. Think conference-bar humor.\nRULE 5 — STRUCTURAL COMPARISONS:\
    \ When the paper introduces a method from a different tradition (Bayesian, spectral,\
    \ kernel), explicitly compare the structural differences with mainstream deep\
    \ learning. E.g., \"GP uses a kernel function where a neural net would learn features\"\
    \ — make it concrete.\nRULE 6 — HONESTY: If a paper oversells or the claims aren't\
    \ well-supported, say so. Our listeners deserve honest analysis, not hype.\nRULE\
    \ 7 — LENGTH: The podcast should be substantial. For a single paper, aim for 15-23\
    \ minutes of audio (~3000-3500 words). Don't rush through concepts — if you're\
    \ citing more papers and explaining more background, use the space. Better to\
    \ be thorough than superficial.\n"
  multi_paper_instructions: 'You are two AI researchers discussing {num_papers} papers
    together. Start by identifying the common themes and connections across all papers.
    Explain why these papers are interesting when considered together — what shared
    trends, complementary approaches, or tensions do they reveal? Then discuss each
    paper''s specific contribution, always tying it back to the overarching themes.
    Keep the discussion accessible but technically accurate. End with a synthesis
    of where this area of research is heading based on these papers.

    '

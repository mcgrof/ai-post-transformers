image_generation:
  enabled: true
  model: gpt-image-1
  size: "1024x1024"
  quality: high
  style_prompt: >
    Create a dark-themed scientific infographic with accent colors.
    Use a deep dark background. Include abstract geometric shapes,
    neural network motifs, or data flow diagrams that relate to the
    research topic. Modern, clean, minimalist aesthetic.
    No text or words in the image.

podcast:
  audio_dir: podcasts
  instructions: >
    You are two AI researchers discussing a new paper. The host introduces the paper
    and its key contributions. The guest provides technical analysis and discusses
    implications for the field, especially regarding memory and storage in AI systems.
    Keep the discussion accessible but technically accurate. Highlight practical
    takeaways and open questions.
  multi_paper_instructions: >
    You are two AI researchers discussing {num_papers} papers together. Start by
    identifying the common themes and connections across all papers. Explain why
    these papers are interesting when considered together — what shared trends,
    complementary approaches, or tensions do they reveal? Then discuss each paper's
    specific contribution, always tying it back to the overarching themes. Keep
    the discussion accessible but technically accurate. End with a synthesis of
    where this area of research is heading based on these papers.


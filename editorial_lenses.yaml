# Editorial lenses for the AI Post Transformers paper queue.
#
# This file defines the two declared editorial lenses, taxonomy
# buckets, valid statuses, valid badges, narrow domain penalty
# list, and arXiv category mappings.

lenses:
  public_interest:
    name: Public AI Interest
    description: >
      Papers likely to matter to a broad AI audience and make
      a strong educational episode.
    signals:
      - broad_relevance
      - momentum
      - teachability
      - novelty_score
      - evidence_score

  memory_storage:
    name: Memory / Storage First-Class AI
    description: >
      Papers that directly improve, explain, or exploit memory
      bandwidth, memory capacity, KV cache behavior, data
      movement, offload, quantization, locality, tiering,
      paging, interconnect, or scheduling in AI systems.
    signals:
      - direct_memory_relevance
      - systems_leverage
      - deployment_proximity
      - memory_adjacent_future_value
      - bandwidth_capacity

taxonomy:
  scope_buckets:
    - foundation
    - systems
    - architecture
    - training
    - inference
    - eval
    - benchmark
    - hardware
    - application
    - survey

  domain_buckets:
    - llm
    - multimodal
    - vision
    - audio
    - robotics
    - bio
    - medical
    - graphics
    - pde
    - recommendation
    - other

  paper_types:
    - theory
    - empirical
    - systems
    - benchmark
    - survey
    - application

statuses:
  - Cover now
  - Monitor
  - Deferred this cycle
  - Out of scope

badges:
  - Public AI
  - Memory/Storage Core
  - Memory/Storage Adjacent
  - Bridge
  - Systems
  - Theory
  - Hardware
  - Training
  - Inference
  - Application

narrow_domain_penalty_list:
  - image restoration
  - medical segmentation
  - point clouds
  - PDE solvers
  - recommendation systems
  - anomaly detection
  - video editing
  - quantum-classical hybrids

# Categories that are broad enough to include non-AI papers.
# Papers from these categories must mention at least one AI/ML
# keyword in their title or abstract; otherwise they receive a
# heavy penalty via the non_ai_relevance_flag.
broad_non_ai_categories:
  - cs.DC
  - cs.DB
  - cs.PF
  - cs.AR


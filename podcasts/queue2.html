<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paper Queue — AI Post Transformers</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #141414; color: #e0e0e0; line-height: 1.6; }

.hero {
  position: relative; padding: 2.5rem 1.5rem 1.5rem; text-align: center;
  background: linear-gradient(180deg, #1a1a2e 0%, #141414 100%);
  overflow: visible;
}
.hero::before { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(229,9,20,0.12) 0%, transparent 70%); pointer-events: none; }
.hero * { position: relative; }
.hero h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.2rem; }
.hero .tagline { color: #999; font-size: 0.85rem; max-width: 460px; margin: 0 auto 0.6rem; }
.hero-nav { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }
.hero-nav a { color: #aaa; text-decoration: none; font-size: 0.78rem; padding: 0.25rem 0.6rem; border: 1px solid #333; border-radius: 20px; transition: all 0.15s; }
.hero-nav a:hover { color: #fff; border-color: #e50914; }

.search-wrap { max-width: 700px; margin: 0 auto; padding: 1rem 1rem 0.5rem; }
.search-wrap input { width: 100%; background: #1a1a2a; border: 1px solid #2a2a3a; border-radius: 8px; padding: 0.5rem 0.9rem; color: #e0e0e0; font-size: 0.85rem; outline: none; }
.search-wrap input:focus { border-color: #e50914; }
.search-wrap input::placeholder { color: #555; }

.tabs { max-width: 700px; margin: 0 auto; padding: 0.5rem 1rem; display: flex; gap: 0.4rem; flex-wrap: wrap; }
.tab { background: #1a1a2a; border: 1px solid #2a2a3a; border-radius: 6px; padding: 0.4rem 0.8rem; font-size: 0.78rem; color: #999; cursor: pointer; transition: all 0.15s; }
.tab:hover { border-color: #555; color: #ccc; }
.tab.active { background: #e50914; border-color: #e50914; color: #fff; }
.tab .count { margin-left: 0.3rem; opacity: 0.7; }

.panel { max-width: 700px; margin: 0 auto; padding: 0.5rem 1rem 2rem; display: none; }
.panel.active { display: block; }

.paper { background: #1a1a2a; border-radius: 8px; margin-bottom: 0.6rem; overflow: hidden; }
.paper-header { padding: 0.7rem 0.9rem; cursor: pointer; display: flex; gap: 0.6rem; align-items: flex-start; }
.paper-header:hover { background: #222233; }
.paper-score { background: #2a2a3a; border-radius: 4px; padding: 0.15rem 0.4rem; font-size: 0.7rem; font-weight: 600; color: #aaa; flex-shrink: 0; min-width: 2.5rem; text-align: center; }
.paper-score.high { background: #2d5a2d; color: #9f9; }
.paper-score.mid { background: #5a5a2d; color: #ff9; }
.paper-main { flex: 1; min-width: 0; }
.paper-title { font-size: 0.85rem; font-weight: 600; color: #e0e0e0; margin-bottom: 0.2rem; }
.paper-title a { color: inherit; text-decoration: none; }
.paper-title a:hover { color: #fff; text-decoration: underline; }
.paper-hook { font-size: 0.78rem; color: #888; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.paper-date { font-size: 0.7rem; color: #555; flex-shrink: 0; }

.paper-detail { padding: 0 0.9rem 0.8rem; display: none; border-top: 1px solid #2a2a3a; }
.paper-detail.open { display: block; }
.paper-detail h4 { font-size: 0.72rem; color: #666; margin: 0.6rem 0 0.2rem; text-transform: uppercase; letter-spacing: 0.03em; }
.paper-detail p { font-size: 0.8rem; color: #aaa; line-height: 1.45; }
.paper-authors { font-size: 0.75rem; color: #777; }
.paper-badges { margin-top: 0.4rem; display: flex; gap: 0.3rem; flex-wrap: wrap; }
.badge { background: #2a2a3a; border-radius: 3px; padding: 0.1rem 0.35rem; font-size: 0.65rem; color: #888; }

.paper.hidden { display: none; }

footer { max-width: 700px; margin: 0 auto; padding: 1rem 1rem; border-top: 1px solid #1e1e1e; color: #444; font-size: 0.72rem; text-align: center; }
footer a { color: #666; text-decoration: none; }
footer a:hover { color: #ccc; }

@media (max-width: 480px) {
  .hero { padding: 1.5rem 1rem 1rem; }
  .hero h1 { font-size: 1.3rem; }
  .paper-header { flex-wrap: wrap; gap: 0.4rem; }
  .paper-date { width: 100%; }
}
</style>
</head>
<body>

<div class="hero">
  <h1>Paper Queue</h1>
  <p class="tagline">Research papers under consideration for future episodes</p>
  <div class="hero-nav">
    <a href="/">← Main Site</a>
    <a href="/feed.xml">RSS</a>
    <a href="https://github.com/mcgrof/ai-post-transformers" target="_blank">GitHub</a>
  </div>
</div>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Search papers…" autocomplete="off">
</div>

<div class="tabs" id="tabs"></div>
<div id="panels"></div>

<footer>AI Post Transformers · <a href="https://github.com/mcgrof/ai-post-transformers">source</a> · <a href="/feed.xml">rss</a></footer>

<script>
const QUEUE = {"public": [], "memory": [], "bridge": [], "monitor": [], "deferred": [], "out_of_scope": []};

const CATEGORY_META = {
  public: { label: 'Public', desc: 'High public interest' },
  memory: { label: 'Memory', desc: 'Memory/storage focus' },
  bridge: { label: 'Bridge', desc: 'Bridging domains' },
  monitor: { label: 'Monitor', desc: 'Worth watching' },
  deferred: { label: 'Deferred', desc: 'Saved for later' }
};

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getScore(paper) {
  return Math.round((paper.public_interest_score || paper.memory_score || paper.bridge_score || 0) * 100) / 100;
}

function scoreClass(score) {
  if (score >= 0.7) return 'high';
  if (score >= 0.5) return 'mid';
  return '';
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const panels = document.getElementById('panels');
  let first = true;
  
  for (const [cat, meta] of Object.entries(CATEGORY_META)) {
    const papers = QUEUE[cat] || [];
    const tab = document.createElement('div');
    tab.className = 'tab' + (first ? ' active' : '');
    tab.dataset.cat = cat;
    tab.innerHTML = meta.label + '<span class="count">(' + papers.length + ')</span>';
    tab.onclick = () => switchTab(cat);
    tabs.appendChild(tab);
    
    const panel = document.createElement('div');
    panel.className = 'panel' + (first ? ' active' : '');
    panel.id = 'panel-' + cat;
    panel.innerHTML = papers.map((p, i) => renderPaper(p, i)).join('');
    panels.appendChild(panel);
    
    first = false;
  }
}

function renderPaper(paper, idx) {
  const score = getScore(paper);
  const authors = (paper.authors || []).slice(0, 3).join(', ') + (paper.authors && paper.authors.length > 3 ? ' et al.' : '');
  const badges = (paper.badges || []).map(b => '<span class="badge">' + escapeHtml(b) + '</span>').join('');
  
  return '<div class="paper" data-idx="' + idx + '" data-search="' + escapeHtml((paper.title + ' ' + authors).toLowerCase()) + '">' +
    '<div class="paper-header" onclick="toggleDetail(this)">' +
      '<div class="paper-score ' + scoreClass(score) + '">' + score.toFixed(2) + '</div>' +
      '<div class="paper-main">' +
        '<div class="paper-title"><a href="' + escapeHtml(paper.url) + '" target="_blank" onclick="event.stopPropagation()">' + escapeHtml(paper.title) + '</a></div>' +
        '<div class="paper-hook">' + escapeHtml(paper.one_sentence_episode_hook || '') + '</div>' +
      '</div>' +
      '<div class="paper-date">' + formatDate(paper.published_at) + '</div>' +
    '</div>' +
    '<div class="paper-detail">' +
      '<div class="paper-authors">' + escapeHtml(authors) + '</div>' +
      (paper.why_now ? '<h4>Why Now</h4><p>' + escapeHtml(paper.why_now) + '</p>' : '') +
      (paper.what_would_raise_priority ? '<h4>What Would Raise Priority</h4><p>' + escapeHtml(paper.what_would_raise_priority) + '</p>' : '') +
      (badges ? '<div class="paper-badges">' + badges + '</div>' : '') +
    '</div>' +
  '</div>';
}

function switchTab(cat) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + cat));
}

function toggleDetail(header) {
  header.nextElementSibling.classList.toggle('open');
}

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.paper').forEach(el => {
    el.classList.toggle('hidden', q.length > 0 && !el.dataset.search.includes(q));
  });
});

renderTabs();
</script>

</body>
</html>

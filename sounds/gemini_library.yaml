# Gemini-Generated Sound Library (Trimmed for Podcast)
# All files in ./sounds/ directory (relative paths)

sounds:
  # Theme & Opening (Two versions available)
  # Use theme_short for regular episodes, theme_full for special episodes
  theme_short:
    file: "theme-short.mp3"
    source: "Custom Theme (Gemini)"
    license: "Proprietary (can redistribute)"
    duration_ms: 5000
    attribution: ""

  theme_full:
    file: "theme-full.mp3"
    source: "Custom Theme (Gemini)"
    license: "Proprietary (can redistribute)"
    duration_ms: 10000
    attribution: ""

  # Default theme (points to short version for regular episodes)
  theme:
    file: "theme-short.mp3"
    source: "Custom Theme"
    license: "Proprietary"
    duration_ms: 5000
    attribution: ""
    variants:
      short: "theme-short.mp3"
      full: "theme-full.mp3"
    default: "short"

  # AI Alert Notification (Gemini - 1s ping)
  notification:
    file: "notification.mp3"
    source: "Gemini Audio Generation"
    license: "Redistributable"
    duration_ms: 1000
    attribution: "Alert sound generated by Google Gemini"

  # Beat/Pause for Timing (Gemini - 0.5s)
  pause_beep:
    file: "pause_beep.mp3"
    source: "Gemini Audio Generation"
    license: "Redistributable"
    duration_ms: 500
    attribution: ""

  # Transition Whoosh (Gemini - 1.2s)
  whoosh:
    file: "whoosh.mp3"
    source: "Gemini Audio Generation"
    license: "Redistributable"
    duration_ms: 1200
    attribution: ""

  # Section Stinger (Gemini - 2s break)
  transition:
    file: "section.mp3"
    source: "Gemini Audio Generation"
    license: "Redistributable"
    duration_ms: 2000
    attribution: ""

  # Success Chime (Gemini - 0.8s)
  success_chime:
    file: "success.mp3"
    source: "Gemini Audio Generation"
    license: "Redistributable"
    duration_ms: 800
    attribution: ""

  # Emotional Recognition Swell (Gemini - 3s)
  moment_of_recognition:
    file: "recognition.mp3"
    source: "Gemini Audio Generation"
    license: "Redistributable"
    duration_ms: 3000
    attribution: ""

# Production Attribution for Show Notes
cc_by_attribution: |
  **Sound Design Credits**

  Theme and sound effects generated by Google Gemini Audio.
  Used under redistribution rights.

# Map old sound names to gemini versions (for compatibility)
sound_aliases:
  dramatic_strings: moment_of_recognition  # Use recognition swell for drama
  boardroom: transition                     # Use stinger for scene breaks
  transition_stinger: transition
  theme_reprise: theme                      # Reprise is same as main theme (trim from end if needed)
  theme_out: theme                          # Use theme again for outro

# Setup Instructions for Production Use
production_notes: |
  To use this production sound library:

  1. Run the download script:
     python3 download_production_sounds.py

  2. Verify all sounds downloaded correctly:
     ffprobe sounds/*.mp3 -v error -show_entries format=duration

  3. Replace sound_library.yaml with sound_library_production.yaml:
     cp sounds/sound_library.yaml sounds/sound_library_test.yaml
     cp sounds/sound_library_production.yaml sounds/sound_library.yaml

  4. Test with a VERA episode:
     python3 -c "from verbatim_podcast import generate_verbatim_podcast_from_script; ..."

  5. Verify audio includes real sounds (listen to the MP3):
     - Opening theme (Incompetech)
     - Notification pings (Freesound)
     - Transition sounds (Freesound)
     - Dramatic strings (Incompetech)

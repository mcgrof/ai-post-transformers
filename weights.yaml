# Scoring weights for the editorial queue.
#
# All formulas are transparent and publicly editable.
# Scores are computed as weighted sums, then clamped to [0, 1].

public_interest:
  broad_relevance: 0.30
  momentum: 0.20
  teachability: 0.20
  novelty: 0.15
  evidence: 0.15

memory:
  direct_memory_relevance: 0.30
  systems_leverage: 0.18
  deployment_proximity: 0.15
  evidence: 0.12
  memory_adjacent_future_value: 0.10
  bandwidth_capacity: 0.15

quality:
  evidence: 0.40
  transferability: 0.25
  clarity: 0.20
  reproducibility: 0.15

# Boost and penalty values
boosts:
  hf_trending: 0.12
  github_submission: 0.08
  citation_velocity_max: 0.10
  bridge_bonus: 0.10
  social_signal_weight: 0.80    # how much social/influencer score contributes to momentum
  pwc_trending: 0.10            # Papers With Code trending boost
  compound_window_max: 0.15     # max boost for papers trending across time windows

penalties:
  fatigue_max: 0.25
  negative_profile_max: 0.30
  narrow_domain: 0.20

# Shortlist configuration
shortlist:
  size: 100
  min_max_axis: 0.15
  memory_pool_size: 20
  memory_min_score: 0.25

# Final queue allocation
final_queue:
  bridge: 10
  public: 10
  memory: 10
  diversity_cap: 3
  bridge_min_score: 0.30
  public_min_score: 0.35
  memory_min_score: 0.25
  memory_first_score: 0.40
